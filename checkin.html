<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場報到｜臨床教學中的拋與接-教學溝通的心理安全感與回饋技巧工作坊</title>
<style>
  :root{
    --bg:#f2f8fa;--ink:#143a47;--muted:#5b7a85;
    --teal:#45b6dc;--teal-dark:#1f87b0;--teal-soft:#e4f4fb;
    --accent:#1f9bc9;--accent-dark:#1a82ab;--gold:#f5c400;--gold-dark:#e0a800;
    --card:#fff;--line:#d8e7ec;--shadow:0 12px 34px rgba(20,90,110,.12);
    --ok:#1e9e6a;--warn:#d98a00;--err:#c0392b;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;
    background:linear-gradient(135deg,#ffe066 0%,#f5c400 55%,#ecb200 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px 40px;}
  .head{width:100%;max-width:560px;text-align:center;color:#143a47;margin:14px 0 22px;}
  .head .tag{display:inline-block;background:rgba(255,255,255,.55);border:1px solid rgba(20,60,80,.15);
    padding:5px 15px;border-radius:999px;font-size:.82rem;font-weight:600;margin-bottom:14px;}
  .head h1{margin:0;font-size:clamp(1.25rem,3.6vw,1.7rem);font-weight:800;line-height:1.35;}
  .head p{margin:8px 0 0;color:#1d4a59;font-size:.95rem;}

  .card{width:100%;max-width:560px;background:var(--card);border-radius:22px;box-shadow:var(--shadow);
    padding:34px 28px;}
  .card h2{margin:0 0 6px;font-size:1.35rem;font-weight:800;text-align:center;}
  .card .lead{margin:0 0 22px;text-align:center;color:var(--muted);font-size:.95rem;}
  label{display:block;font-weight:700;margin-bottom:10px;font-size:1rem;}
  .empno-wrap{display:flex;gap:12px;flex-wrap:wrap;}
  input{flex:1;min-width:0;font:inherit;font-size:1.5rem;letter-spacing:.06em;text-align:center;
    padding:16px 18px;border-radius:14px;border:2px solid var(--line);background:#fbfdff;color:var(--ink);
    font-weight:700;}
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(31,155,201,.2);}
  .btn{cursor:pointer;font-weight:800;font-size:1.15rem;border:none;border-radius:14px;
    padding:16px 30px;background:var(--accent);color:#fff;transition:transform .12s,background .15s;
    box-shadow:0 8px 20px rgba(31,135,176,.35);white-space:nowrap;}
  .btn:hover{background:var(--accent-dark);}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .hint{margin-top:12px;font-size:.85rem;color:var(--muted);text-align:center;}

  .result{margin-top:22px;border-radius:16px;padding:22px 20px;text-align:center;display:none;}
  .result.show{display:block;animation:pop .25s ease;}
  @keyframes pop{from{transform:scale(.96);opacity:0;}to{transform:scale(1);opacity:1;}}
  .result .icon{font-size:2.4rem;line-height:1;margin-bottom:8px;}
  .result h3{margin:0 0 6px;font-size:1.5rem;font-weight:800;}
  .result p{margin:0;font-size:1rem;}
  .result .meta{margin-top:10px;font-size:.92rem;opacity:.85;}
  .result.ok{background:#e7f7f0;color:#12603f;border:1px solid #b6e6d2;}
  .result.warn{background:#fff5e0;color:#8a5a00;border:1px solid #f4dfa8;}
  .result.err{background:#fdecea;color:#a5281b;border:1px solid #f4c3bd;}

  .recent{width:100%;max-width:560px;margin-top:24px;background:rgba(255,255,255,.55);
    border:1px solid rgba(20,60,80,.1);border-radius:16px;padding:16px 18px;display:none;}
  .recent.show{display:block;}
  .recent h4{margin:0 0 10px;font-size:.92rem;color:#1d4a59;font-weight:700;}
  .recent ul{list-style:none;margin:0;padding:0;}
  .recent li{display:flex;justify-content:space-between;gap:10px;font-size:.9rem;padding:6px 0;
    border-bottom:1px dashed rgba(20,60,80,.15);}
  .recent li:last-child{border-bottom:none;}
  .recent li .nm{font-weight:700;color:#143a47;}
  .recent li .tm{color:#5b7a85;font-variant-numeric:tabular-nums;}

  .foot{margin-top:26px;color:#1d4a59;font-size:.82rem;text-align:center;opacity:.85;}
</style>
</head>
<body>
  <div class="head">
    <span class="tag">奇美醫療財團法人奇美醫院 · 教學部</span>
    <h1>臨床教學中的拋與接<br>教學溝通的心理安全感與回饋技巧工作坊</h1>
    <p>115年7月4日（六）· 現場報到</p>
  </div>

  <div class="card">
    <h2>現場報到</h2>
    <p class="lead">請輸入您的「人事號」完成報到</p>
    <form id="checkinForm" novalidate>
      <label for="empno">人事號</label>
      <div class="empno-wrap">
        <input type="text" id="empno" name="empno" inputmode="numeric" autocomplete="off"
               placeholder="請輸入人事號" required autofocus>
        <button type="submit" class="btn" id="submitBtn">報到</button>
      </div>
      <p class="hint">輸入後按「報到」或 Enter 鍵即可</p>
    </form>

    <div class="result" id="result">
      <div class="icon" id="rIcon"></div>
      <h3 id="rTitle"></h3>
      <p id="rMsg"></p>
      <div class="meta" id="rMeta"></div>
    </div>
  </div>

  <div class="recent" id="recent">
    <h4>本裝置最近報到紀錄</h4>
    <ul id="recentList"></ul>
  </div>

  <div class="foot">如遇問題請洽現場工作人員 · 教學部 06-281-2811 分機 57439</div>

<script>
  // 與 index.html 相同的 Apps Script Web App 網址（doPost 以 action:'checkin' 分流）
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_Nq9__BMhF1szoVIPsw3bJ1p4HfZEh0dkrL292-Vnto1FORFNX2Xw5zUjh9j36qD2/exec';

  const form = document.getElementById('checkinForm');
  const empnoEl = document.getElementById('empno');
  const submitBtn = document.getElementById('submitBtn');
  const result = document.getElementById('result');
  const rIcon = document.getElementById('rIcon');
  const rTitle = document.getElementById('rTitle');
  const rMsg = document.getElementById('rMsg');
  const rMeta = document.getElementById('rMeta');
  const recent = document.getElementById('recent');
  const recentList = document.getElementById('recentList');

  function showResult(kind, icon, title, msg, meta){
    result.className = 'result show ' + kind;
    rIcon.textContent = icon;
    rTitle.textContent = title;
    rMsg.innerHTML = msg || '';
    rMeta.innerHTML = meta || '';
  }

  function addRecent(name, campus, time){
    const li = document.createElement('li');
    const t = (time || '').split(' ')[1] || time || '';
    li.innerHTML = '<span class="nm">' + esc(name) + '　<span style="font-weight:500;color:#5b7a85;">' +
      esc(campus || '') + '</span></span><span class="tm">' + esc(t) + '</span>';
    recentList.insertBefore(li, recentList.firstChild);
    while(recentList.children.length > 8) recentList.removeChild(recentList.lastChild);
    recent.classList.add('show');
  }
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  function resetInput(){
    empnoEl.value = '';
    empnoEl.focus();
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const empno = empnoEl.value.trim();
    if(!empno){ empnoEl.focus(); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = '報到中…';

    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'checkin', empno: empno })
    })
    .then(r => r.json())
    .then(d => {
      if(d.result === 'success'){
        showResult('ok', '✅', '報到成功', '<strong style="font-size:1.15rem;">' + esc(d.name) + '</strong> 您好，歡迎參加！',
          esc(d.campus || '') + (d.dept ? '　' + esc(d.dept) : ''));
        addRecent(d.name, d.campus, d.time);
        resetInput();
      } else if(d.result === 'already'){
        showResult('warn', '⚠️', '已完成報到', '<strong>' + esc(d.name) + '</strong> 已於稍早完成報到，無需重複報到。',
          d.time ? '報到時間：' + esc(d.time) : '');
        resetInput();
      } else if(d.result === 'notfound'){
        showResult('err', '❌', '查無報名資料', '查無人事號 <strong>' + esc(empno) + '</strong> 的報名紀錄，<br>請確認號碼或洽詢現場工作人員。', '');
        empnoEl.select();
      } else {
        showResult('err', '❌', '報到失敗', esc(d.message || '請稍後再試'), '');
      }
    })
    .catch(() => {
      showResult('err', '❌', '連線失敗', '無法連線至伺服器，請檢查網路後再試一次。', '');
    })
    .finally(() => {
      submitBtn.disabled = false;
      submitBtn.textContent = '報到';
    });
  });

  empnoEl.focus();
</script>
</body>
</html>
